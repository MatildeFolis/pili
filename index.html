<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pili · Mis XV · Asistente</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #f7f9f5; --ac: #474f2e; --ac-light: #bfc1b6; --ac-pale: #e3e5e0; --ink: #3a4a38; --muted: #7a8f78; --white: #ffffff; }
  body { background: var(--bg); font-family: 'Jost', sans-serif; color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
  .header { text-align: center; padding: 40px 24px 16px; width: 100%; max-width: 480px; }
  .event-label { font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .main-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(48px, 13vw, 68px); font-style: italic; font-weight: 300; color: var(--ink); line-height: 1; margin-bottom: 4px; }
  .event-type { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ac); margin-bottom: 10px; font-weight: 400; }
  .event-date { font-family: 'Cormorant Garamond', serif; font-size: 14px; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 12px; }
  .divider { display: flex; align-items: center; justify-content: center; gap: 10px; }
  .divider span { display: block; width: 48px; height: 1px; background: var(--ac-light); }
  .link-btns { width: 100%; max-width: 480px; padding: 16px 20px 8px; display: flex; flex-direction: column; gap: 8px; }
  .link-btn { display: block; text-align: center; background: var(--ac); color: white; font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; padding: 13px 16px; border-radius: 10px; text-decoration: none; transition: opacity 0.2s; }
  .link-btn:hover { opacity: 0.85; }
  .link-btn.outline { background: transparent; border: 1px solid var(--ac-light); color: var(--ac); }
  .link-btn.outline:hover { background: var(--ac-pale); }
  .quick-wrap { width: 100%; max-width: 480px; padding: 8px 20px 12px; display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
  .qbtn { background: var(--white); border: 1px solid var(--ac-light); color: var(--muted); font-family: 'Jost', sans-serif; font-size: 11px; padding: 7px 13px; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
  .qbtn:hover { background: var(--ac-pale); border-color: var(--ac); color: var(--ink); }
  .chat-wrap { width: 100%; max-width: 480px; flex: 1; display: flex; flex-direction: column; padding: 0 16px 140px; gap: 14px; }
  .msg { display: flex; gap: 9px; align-items: flex-end; animation: fadeUp 0.3s ease both; }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--ac-pale); border: 1px solid var(--ac-light); font-size: 16px; }
  .msg.user .avatar { background: var(--white); font-family: 'Jost', sans-serif; font-size: 9px; color: var(--muted); }
  .bubble { max-width: 78%; padding: 11px 15px; border-radius: 16px; font-size: 13.5px; line-height: 1.65; font-weight: 300; }
  .msg.bot .bubble { background: var(--white); border: 1px solid var(--ac-light); border-bottom-left-radius: 4px; color: var(--ink); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .msg.user .bubble { background: var(--ac-pale); border: 1px solid var(--ac-light); border-bottom-right-radius: 4px; color: var(--ink); }
  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
  .typing-dots span { width: 5px; height: 5px; background: var(--ac-light); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-5px); opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .input-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px 20px; background: linear-gradient(to top, var(--bg) 75%, transparent); display: flex; justify-content: center; }
  .input-inner { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 480px; background: var(--white); border: 1px solid var(--ac-light); border-radius: 28px; padding: 9px 9px 9px 18px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); transition: border-color 0.2s; }
  .input-inner:focus-within { border-color: var(--ac); }
  .input-inner input { flex: 1; background: transparent; border: none; outline: none; color: var(--ink); font-family: 'Jost', sans-serif; font-size: 13.5px; font-weight: 300; }
  .input-inner input::placeholder { color: var(--ac-light); }
  .send-btn { width: 36px; height: 36px; background: var(--ac); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; flex-shrink: 0; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: default; }
  .send-btn svg { width: 14px; height: 14px; fill: white; transform: translateX(1px); }
  .footer-note { text-align: center; font-size: 10px; color: var(--ac-light); margin-top: 5px; letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="header">
  <div class="event-label">✦ Asistente del evento ✦</div>
  <div class="main-name">Pili</div>
  <div class="event-type">Mis XV Años</div>
  <div class="event-date">2/1/2027</div>
  <div class="divider"><span></span><svg width="14" height="14" viewBox="0 0 24 24" fill="#bfc1b6"><path d="M12 2C8 8 4 10 2 14c2-1 4-1 6 0-3 3-4 6-3 9 2-2 4-4 7-4s5 2 7 4c1-3 0-6-3-9 2-1 4-1 6 0-2-4-6-6-10-12z"/></svg><span></span></div>
</div>
<div class="link-btns">
  <a href="https://forms.gle/G3HsFVEPemJEFN6T6" target="_blank" class="link-btn">✅ Confirmar asistencia</a>
  <a href="https://forms.gle/bFkvsLU8ooSmTmQV6" target="_blank" class="link-btn outline">🎵 Sugerir una canción</a>
  <a href="https://photos.app.goo.gl/bw11wR5J9TyNaPq78" target="_blank" class="link-btn outline">📸 Álbum de fotos</a>
</div>
<div class="quick-wrap">
<button class="qbtn" onclick="ask('📍 ¿Dónde es la fiesta?')">📍 ¿Dónde es la fiesta?</button>
<button class="qbtn" onclick="ask('🗺️ ¿Cómo llego?')">🗺️ ¿Cómo llego?</button>
<button class="qbtn" onclick="ask('👗 ¿Cuál es el dress code?')">👗 ¿Cuál es el dress code?</button>
<button class="qbtn" onclick="ask('🕐 ¿A qué hora empieza?')">🕐 ¿A qué hora empieza?</button>
<button class="qbtn" onclick="ask('🎁 ¿Cómo hago un regalo?')">🎁 ¿Cómo hago un regalo?</button>
<button class="qbtn" onclick="ask('✅ ¿Cómo confirmo asistencia?')">✅ ¿Cómo confirmo asistencia?</button>
<button class="qbtn" onclick="ask('🎵 ¿Puedo sugerir una canción?')">🎵 ¿Puedo sugerir una canción?</button>
<button class="qbtn" onclick="ask('📸 ¿Dónde veo las fotos?')">📸 ¿Dónde veo las fotos?</button>
<button class="qbtn" onclick="ask('🚗 ¿Hay estacionamiento?')">🚗 ¿Hay estacionamiento?</button>
</div>
<div class="chat-wrap" id="chat">
  <div class="msg bot">
    <div class="avatar">🌸</div>
    <div class="bubble">¡Hola! Soy el asistente de los XV de Pili 🌸 Podés preguntarme todo sobre el evento.</div>
  </div>
</div>
<div class="input-bar">
  <div style="width:100%;max-width:480px">
    <div class="input-inner">
      <input type="text" id="inp" placeholder="Escribí tu pregunta…" onkeydown="if(event.key==='Enter')send()" maxlength="300">
      <button class="send-btn" id="sbtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2 12L22 2L14 22L11 13L2 12Z"/></svg>
      </button>
    </div>
    <div class="footer-note">Asistente de InvitArte · Solo responde sobre este evento</div>
  </div>
</div>
<script>
const SYSTEM = `Sos el asistente virtual de los XV años de Pili.
Respondé siempre en español argentino, de forma cálida, breve y elegante (máximo 4 oraciones).
Solo respondés preguntas sobre este evento. Si te preguntan algo ajeno, redirigí amablemente.
No uses asteriscos, guiones, negritas ni ningún tipo de markdown. Solo texto limpio y cálido.
Cuando alguien quiera confirmar asistencia, sugerir canción o ver fotos, decile que use los botones que están arriba del chat.
Si no sabés algo, decile que puede contactar a Mamá Laura 11  15428598.
DATOS DEL EVENTO:
- Festejada: Pili
- Evento: XV Años
- Fecha: 2/1/2027
- Hora de inicio: 22
- Hora de fin: 4 am
- Mapa/ubicación: https://maps.app.goo.gl/TmsprawRsV8nNaGF9
- Estacionamiento: Sin costo, en el mismo salon
- Dress code: Formal elegante, nude reservado para la cumpleañera
- Mesa de regalos: Alias piliXV.mp / Titular Pilar Rodriguez / mercado pago
- Valor de la tarjeta: sin costo
- Confirmar asistencia antes del: 30/11/2026. Usar el botón de arriba.`;
let history=[], busy=false, typingEl=null;
function ask(t){document.getElementById('inp').value=t;send();}
async function send(){
  if(busy)return;
  const inp=document.getElementById('inp');
  const text=inp.value.trim(); if(!text)return;
  inp.value=''; addMsg('user',text); history.push({role:'user',content:text});
  busy=true; document.getElementById('sbtn').disabled=true; showTyping();
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:SYSTEM,messages:history})});
    const data=await res.json();
    const reply=data.content?.find(b=>b.type==='text')?.text||'No pude responder. Contactá a Mamá Laura 11  15428598';
    hideTyping(); addMsg('bot',reply); history.push({role:'assistant',content:reply});
  }catch(e){hideTyping(); addMsg('bot','Hubo un problema de conexión. Intentá de nuevo.');}
  finally{busy=false; document.getElementById('sbtn').disabled=false;}
}
function addMsg(type,text){
  const chat=document.getElementById('chat');
  const div=document.createElement('div'); div.className=`msg ${type}`;
  const av=document.createElement('div'); av.className='avatar'; av.textContent=type==='bot'?'🌸':'Vos';
  const bub=document.createElement('div'); bub.className='bubble'; bub.textContent=text;
  div.appendChild(av); div.appendChild(bub); chat.appendChild(div);
  window.scrollTo(0,document.body.scrollHeight);
}
function showTyping(){
  const chat=document.getElementById('chat');
  typingEl=document.createElement('div'); typingEl.className='msg bot';
  typingEl.innerHTML=`<div class="avatar">🌸</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(typingEl); window.scrollTo(0,document.body.scrollHeight);
}
function hideTyping(){if(typingEl){typingEl.remove();typingEl=null;}}
</script>
</body>
</html>
